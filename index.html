<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmberThree</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d10;
        color: #e6e6e6;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        font-size: 12px;
        opacity: 0.7;
        pointer-events: none;
      }
      #preview-frame {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 256px;
        height: 256px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 2px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }
      #preview-label {
        position: fixed;
        right: 24px;
        bottom: 284px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.55;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">EmberThree — Phase 3</div>
    <div id="preview-label">Fluid Sim · Density</div>
    <div id="preview-frame"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
